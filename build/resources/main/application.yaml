spring:
  application:
    name: testsApp

  datasource:
    url: jdbc:postgresql://localhost:5432/tourDB
    username: user
    password: user
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always
      schema-locations:
        - 'classpath:schema.sql'
        - 'classpath:triggers.sql'
      data-locations:
        - 'classpath:data.sql'